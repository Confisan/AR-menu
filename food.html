<!DOCTYPE html>
<html>
<head>
  <title>Food View</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="foodTitle"></h1>

<model-viewer 
  id="viewer"
  src=""
  camera-controls
  auto-rotate
  ar
  ar-modes="scene-viewer webxr quick-look">
</model-viewer>

<button onclick="openAR()">📱 View on Table</button>
<button onclick="startVoice()">🎤 Customize</button>

<div class="swipe">

  <div class="box">
    <h3>Details</h3>
    <p id="details"></p>
  </div>

  <div class="box">
    <h3>Nutrition</h3>
    <p id="nutrition"></p>
  </div>

  <div class="box">
    <h3>Customize</h3>
    <p id="customizeText">Use voice</p>
  </div>

</div>

<button onclick="placeOrder()">Order</button>

<script src="script.js"></script>

</body>
</html>
