<!DOCTYPE html>
<html>
<head>
  <title>3D Food View</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="foodTitle">🍽️ 3D Menu</h1>

<!-- 3D MODEL -->
<model-viewer 
  id="viewer"
  src=""
  camera-controls
  auto-rotate
  style="width:100%; height:50vh;">
</model-viewer>

<!-- SWIPE INFO -->
<div class="swipe-container">

  <div class="swipe-card">
    <h3>🍴 Details</h3>
    <p id="details"></p>
  </div>

  <div class="swipe-card">
    <h3>🔥 Nutrition</h3>
    <p id="nutrition"></p>
  </div>

  <div class="swipe-card">
    <h3>⚙️ Customize</h3>
    <p>Add toppings, extra cheese, etc.</p>
  </div>

</div>

<button onclick="nextFood()">➡️ Next Dish</button>
<button onclick="placeOrder()">🛒 Order Now</button>

<script src="script.js"></script>

</body>
</html>
