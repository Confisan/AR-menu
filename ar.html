<!DOCTYPE html>
<html>
<head>
<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0">

<a-scene embedded arjs>

<a-marker preset="hiro">

<a-entity id="model"
scale="0.5 0.5 0.5"
animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>
const params = new URLSearchParams(window.location.search);
const food = params.get("food");

const model = document.getElementById("model");

if(food === "pizza"){
  model.setAttribute("gltf-model","https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Pizza/glTF-Binary/Pizza.glb");
} else {
  model.setAttribute("gltf-model","https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Burger/glTF-Binary/Burger.glb");
}
</script>

</body>
</html>
