<!DOCTYPE html>
<html>
<head>
  <title>VisionMenu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 3D MODEL VIEWER -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍽️ VisionMenu</h1>

<h2 id="foodName"></h2>

<model-viewer 
  id="viewer"
  src="https://modelviewer.dev/shared-assets/models/Hamburger.glb"
  camera-controls
  auto-rotate
  ar
  ar-modes="scene-viewer webxr quick-look"
  shadow-intensity="1">
</model-viewer>

<div class="info">
  <p id="details"></p>
  <p id="nutrition"></p>
  <p id="customizeText">🎤 Tap mic to customize</p>
</div>

<div class="buttons">
  <button onclick="prevFood()">⬅️</button>
  <button onclick="nextFood()">➡️</button>
</div>

<button onclick="startVoice()">🎤 Speak</button>
<button onclick="openAR()">📱 View on Table</button>
<button onclick="placeOrder()">🛒 Order</button>

<script src="script.js"></script>

</body>
</html>
